databases:
  - name: crane-db
    plan: free
    databaseName: crane
    user: crane

services:
  - type: web
    name: crane
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn crane.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crane-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
