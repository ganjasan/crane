{% extends "base.html" %}
{% load static %}

{% block body %}
<div class="min-h-screen flex flex-col bg-crane-surface">
  <header class="h-14 bg-white border-b border-crane-border flex items-center justify-between px-6">
    <a href="{% url 'org_selector' %}" class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-md bg-crane-primary text-white flex items-center justify-center">
        {% include "icons/crane.html" %}
      </div>
      <span class="text-sm font-semibold text-crane-ink">Crane</span>
    </a>
    {% if user.is_authenticated %}
    <div class="flex items-center gap-3 text-sm">
      <a href="{% url 'account_settings' %}" class="text-crane-muted hover:text-crane-ink">{{ user.email }}</a>
      <form method="post" action="{% url 'logout' %}" class="contents">{% csrf_token %}
        <button type="submit" class="text-crane-muted hover:text-crane-ink">Log out</button>
      </form>
    </div>
    {% endif %}
  </header>
  <main class="flex-1 mx-auto w-full max-w-3xl px-6 py-10">
    {% include "components/_flash_messages.html" %}
    {% block content %}{% endblock %}
  </main>
</div>
{% endblock %}
